<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Jackson - Smooth Criminal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #111;
      color: #fff;
    }

    #game {
      position: relative;
      width: 600px;
      max-width: 95vw;
      height: 400px;
      background: #222;
      border: 4px solid #555;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    #score,
    #message {
      position: absolute;
      left: 10px;
      z-index: 1;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.7);
    }

    #score {
      top: 10px;
      font-size: 18px;
    }

    #message {
      bottom: 10px;
      font-size: 16px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #111;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="score">Pontuação: 0</div>
    <div id="message">Smooth Criminal: use as setas para dançar e pegar os “medalhões”. Pressione R para reiniciar.</div>
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>

  <script>
    // Jogo da Cobrinha (com possibilidade de morrer)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const message = document.getElementById('message');

    const gridSize = 20; // tamanho de cada célula
    const cols = canvas.width / gridSize;
    const rows = canvas.height / gridSize;

    let snake = [{ x: 5, y: 5 }];
    let dir = { x: 1, y: 0 };
    let food = {};
    let score = 0;
    let gameOver = false;
    let running = true;

    function placeFood() {
      food.x = Math.floor(Math.random() * cols);
      food.y = Math.floor(Math.random() * rows);
      // garantir que não nasça sobre a cobra
      for (const s of snake) {
        if (s.x === food.x && s.y === food.y) return placeFood();
      }
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
    }

    function update() {
      if (gameOver || !running) return;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // colisão com paredes -> morrer
      if (head.x < 0 || head.y < 0 || head.x >= cols || head.y >= rows) {
        gameOver = true;
        message.textContent = 'Você bateu na parede! Pressione R para reiniciar.';
        return;
      }

      // colisão consigo mesma -> morrer
      for (const part of snake) {
        if (part.x === head.x && part.y === head.y) {
          gameOver = true;
          message.textContent = 'Você mordeu a si mesmo! Pressione R para reiniciar.';
          return;
        }
      }

      snake.unshift(head);

      // comer comida
      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreElement.textContent = 'Pontuação: ' + score;
        placeFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // fundo
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // desenhar comida
      drawCell(food.x, food.y, '#FFD700');

      // desenhar cobra
      for (let i = 0; i < snake.length; i++) {
        drawCell(snake[i].x, snake[i].y, i === 0 ? '#4CAF50' : '#2E7D32');
      }
    }

    function loop() {
      update();
      draw();
      setTimeout(() => requestAnimationFrame(loop), 100);
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && dir.y !== 1) { dir = { x: 0, y: -1 }; e.preventDefault(); }
      if (e.key === 'ArrowDown' && dir.y !== -1) { dir = { x: 0, y: 1 }; e.preventDefault(); }
      if (e.key === 'ArrowLeft' && dir.x !== 1) { dir = { x: -1, y: 0 }; e.preventDefault(); }
      if (e.key === 'ArrowRight' && dir.x !== -1) { dir = { x: 1, y: 0 }; e.preventDefault(); }

      if (e.key === 'r' || e.key === 'R') {
        // reiniciar
        snake = [{ x: 5, y: 5 }];
        dir = { x: 1, y: 0 };
        score = 0;
        scoreElement.textContent = 'Pontuação: 0';
        message.textContent = 'Use as setas para mover. Pressione R para reiniciar.';
        gameOver = false;
        running = true;
        placeFood();
      }

      if (e.key === ' '){ // pausar com espaço
        running = !running;
        message.textContent = running ? 'Jogo em andamento.' : 'Pausado. Pressione espaço para continuar.';
      }
    });

    // inicializa
    placeFood();
    message.textContent = 'Use as setas para mover. Pressione R para reiniciar.';
    loop();
  </script>
</body>
</html>
